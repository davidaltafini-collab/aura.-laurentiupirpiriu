    <style>
      @font-face {
        font-family: "Space Grotesk";
        font-style: normal;
        font-weight: 700;
        font-display: block;
        src: url("/fonts/captur-space-grotesk-700.woff2") format("woff2");
      }

      @font-face {
        font-family: "Parisienne";
        font-style: normal;
        font-weight: 400;
        font-display: block;
        src: url("/fonts/captur-parisienne-400.woff2") format("woff2");
      }

      html.captur-loading,
      html.captur-loading body {
        min-height: 100%;
        overflow: hidden;
        background: #f8f8f7;
      }

      #captur-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 24px;
        background: #f8f8f7;
        color: #080808;
        font-family: "Space Grotesk", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        pointer-events: auto;
        contain: layout paint style;
        transform: translateZ(0);
      }

      #captur-loader.is-hiding {
        opacity: 0;
        pointer-events: none;
        transition: opacity 520ms ease-out;
      }

      .captur-loader__lockup {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        max-width: min(100%, 960px);
        text-align: center;
      }

      .captur-loader__mark {
        font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(2.9rem, 17vw, 5.8rem);
        font-weight: 700;
        line-height: 0.86;
        letter-spacing: 0;
        text-transform: uppercase;
        animation: captur-loader-pop 520ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .captur-loader__signature {
        font-family: "Parisienne", "Brush Script MT", cursive;
        font-size: clamp(1.35rem, 6.2vw, 2.25rem);
        font-weight: 400;
        line-height: 1;
        opacity: 0;
        transform: translateX(-1rem);
        animation: captur-loader-signature 620ms cubic-bezier(0.22, 1, 0.36, 1) 180ms both;
      }

      @keyframes captur-loader-pop {
        0% {
          transform: scale(0.975);
        }
        68% {
          transform: scale(1.018);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes captur-loader-signature {
        0% {
          opacity: 0;
          transform: translateX(-1.6rem);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @media (min-width: 900px) {
        .captur-loader__lockup {
          flex-direction: row;
          align-items: baseline;
          gap: clamp(0.65rem, 2vw, 1.35rem);
          text-align: left;
          white-space: nowrap;
        }

        .captur-loader__mark {
          font-size: clamp(4.25rem, 10vw, 8.5rem);
        }

        .captur-loader__signature {
          font-size: clamp(2rem, 4vw, 4rem);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #captur-loader,
        #captur-loader.is-hiding,
        .captur-loader__mark,
        .captur-loader__signature {
          animation: none;
          transition: opacity 180ms ease-out;
          transform: none;
        }

        .captur-loader__mark,
        .captur-loader__signature {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="captur-loader" aria-hidden="true">
      <div class="captur-loader__lockup">
        <span class="captur-loader__mark">CAPTUR.</span>
        <span class="captur-loader__signature">by Laurentiu Pirpiliu</span>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var loader = document.getElementById('captur-loader');
        var root = document.getElementById('root');
        var started = Date.now();
        var hidden = false;
        var appReady = false;
        var stylesReady = !document.querySelector('link[data-captur-style]');
        var minVisible = 1200;
        var hideTimer = 0;

        function finishHide() {
          if (!loader || hidden) return;
          hidden = true;
          loader.classList.add('is-hiding');
          document.documentElement.classList.remove('captur-loading');
          setTimeout(function () {
            if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
          }, 620);
        }

        function hideLoader() {
          if (hidden || hideTimer) return;
          var remaining = Math.max(0, minVisible - (Date.now() - started));
          hideTimer = setTimeout(finishHide, remaining);
        }

        function checkReady() {
          if (!appReady && root && root.children.length > 0) appReady = true;
          if (!stylesReady && document.documentElement.classList.contains('captur-styles-ready')) stylesReady = true;
          if (appReady && stylesReady) hideLoader();
        }

        window.__capturAppReady = function () {
          appReady = true;
          checkReady();
        };

        addEventListener('captur:app-ready', window.__capturAppReady, { once: true });
        addEventListener('load', checkReady, { once: true });

        if (!stylesReady) {
          var styleLinks = document.querySelectorAll('link[data-captur-style]');
          styleLinks.forEach(function (link) {
            link.addEventListener('load', function () {
              stylesReady = true;
              checkReady();
            }, { once: true });
          });
        }

        if (root && 'MutationObserver' in window) {
          new MutationObserver(checkReady).observe(root, { childList: true });
        }

        setTimeout(function () {
          stylesReady = true;
          checkReady();
        }, 5000);

        setTimeout(function () {
          appReady = true;
          stylesReady = true;
          finishHide();
        }, 8000);

        checkReady();
      })();
    </script>
    <script>
      // Înălțime de viewport ÎNGHEȚATĂ (--vh = 1% din înălțime, măsurată o dată
      // la încărcare). Necesară pentru că pe Chrome/Firefox de iOS unitatea svh
      // nu e implementată corect și se comportă ca dvh (se recalculează când
      // barele browserului apar/dispar la scroll), ceea ce redimensiona
      // secțiunile hero și împingea toată pagina. Pe touch re-măsurăm DOAR când
      // se schimbă lățimea (rotirea ecranului) — mișcarea barelor schimbă doar
      // înălțimea și e ignorată. Pe desktop re-măsurăm la orice resize, ca
      // fereastra redimensionată să se comporte exact ca până acum.
      (function () {
        var touch = matchMedia('(hover: none) and (pointer: coarse)').matches;
        var w = innerWidth;
        function set() {
          document.documentElement.style.setProperty('--vh', innerHeight * 0.01 + 'px');
        }
        set();
        addEventListener('resize', function () {
          if (!touch || innerWidth !== w) { w = innerWidth; set(); }
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
