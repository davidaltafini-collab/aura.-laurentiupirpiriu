    <style>
      html.captur-loading,
      html.captur-loading body {
        min-height: 100%;
        background: #f8f8f4;
      }

      #captur-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 24px;
        background: #f8f8f4;
        color: #080808;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        pointer-events: auto;
        transform: translateZ(0);
      }

      #captur-loader.is-hiding {
        opacity: 0;
        pointer-events: none;
        transition: opacity 360ms ease-out;
      }

      .captur-loader__lockup {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        max-width: min(100%, 960px);
        text-align: center;
      }

      .captur-loader__mark {
        font-size: clamp(2.75rem, 16vw, 8rem);
        font-weight: 900;
        line-height: 0.86;
        letter-spacing: 0;
        text-transform: uppercase;
        animation: captur-loader-pop 220ms ease-out both;
      }

      .captur-loader__signature {
        font-family: Parisienne, "Brush Script MT", cursive;
        font-size: clamp(1.45rem, 7vw, 3.4rem);
        font-weight: 400;
        line-height: 1;
        opacity: 0;
        transform: translateX(-0.65rem);
        animation: captur-loader-signature 280ms ease-out 80ms both;
      }

      @keyframes captur-loader-pop {
        0% {
          opacity: 0;
          transform: scale(0.96);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes captur-loader-signature {
        0% {
          opacity: 0;
          transform: translateX(-1.6rem);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @media (min-width: 768px) {
        .captur-loader__lockup {
          flex-direction: row;
          align-items: baseline;
          gap: clamp(0.65rem, 2vw, 1.35rem);
          text-align: left;
          white-space: nowrap;
        }

        .captur-loader__mark {
          font-size: clamp(4.25rem, 10vw, 8.5rem);
        }

        .captur-loader__signature {
          font-size: clamp(2rem, 4vw, 4rem);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #captur-loader,
        #captur-loader.is-hiding,
        .captur-loader__mark,
        .captur-loader__signature {
          animation: none;
          transition: opacity 180ms ease-out;
          transform: none;
        }

        .captur-loader__mark,
        .captur-loader__signature {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="captur-loader" aria-hidden="true">
      <div class="captur-loader__lockup">
        <span class="captur-loader__mark">CAPTUR.</span>
        <span class="captur-loader__signature">by Laurentiu Pirpiliu</span>
      </div>
    </div>
    <script>
      (function () {
        var loader = document.getElementById('captur-loader');
        var hidden = false;

        function hideLoader() {
          if (!loader || hidden) return;
          hidden = true;
          loader.classList.add('is-hiding');
          document.documentElement.classList.remove('captur-loading');
          setTimeout(function () {
            if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
          }, 420);
        }

        function hideOnNextFrame() {
          requestAnimationFrame(hideLoader);
        }

        if (document.readyState === 'complete') {
          hideOnNextFrame();
        } else {
          addEventListener('load', hideOnNextFrame, { once: true });
        }

        setTimeout(hideLoader, 3500);
      })();
    </script>
    <script>
      // Înălțime de viewport ÎNGHEȚATĂ (--vh = 1% din înălțime, măsurată o dată
      // la încărcare). Necesară pentru că pe Chrome/Firefox de iOS unitatea svh
      // nu e implementată corect și se comportă ca dvh (se recalculează când
      // barele browserului apar/dispar la scroll), ceea ce redimensiona
      // secțiunile hero și împingea toată pagina. Pe touch re-măsurăm DOAR când
      // se schimbă lățimea (rotirea ecranului) — mișcarea barelor schimbă doar
      // înălțimea și e ignorată. Pe desktop re-măsurăm la orice resize, ca
      // fereastra redimensionată să se comporte exact ca până acum.
      (function () {
        var touch = matchMedia('(hover: none) and (pointer: coarse)').matches;
        var w = innerWidth;
        function set() {
          document.documentElement.style.setProperty('--vh', innerHeight * 0.01 + 'px');
        }
        set();
        addEventListener('resize', function () {
          if (!touch || innerWidth !== w) { w = innerWidth; set(); }
        });
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
